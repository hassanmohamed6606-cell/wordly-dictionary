<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Wordly Dictionary</h1>

        <form id="searchForm">

            <input
                type="text"
                id="wordInput"
                placeholder="Enter a word..."
                required
            >

            <button id="searchBtn" type="submit">
                Search
            </button>

        </form>

        <button id="themeBtn">
            Change Theme
        </button>

        <div id="result"></div>

        <h2>Saved Words</h2>

        <ul id="savedWords"></ul>

    </div>

<footer>
    <p> Created by Roble Said &copy; 2026</p>
</footer>    
    <script src="script.js"></script>

</body>
</html>
