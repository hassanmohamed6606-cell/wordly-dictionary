<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1> Wordly Dictionary</h1>
    </header>

    <main class="container">

      <section>

        <form id="searchForm">

            <input
             type="text"
             id="wordInput"
             placeholder="Enter a word.."
             required
           >
           <button type="submit">
            Search
           </button>
        </form>

      <button id="themeBtn">
        Change Theme
      </button>

     </section>
     <section id="result"></section>
   
     <section>
         <h2> Saved Words</h2>
         <p id="count"> Saved words: 0</p>
         <ul id="savedWords"></ul>
    </section>
</main>

 <footer>
    <p> Created by Mohamed Hassan &copy; 2026</p>
 </footer>  
  <script src="script.js"></script>

</body>
</html>
